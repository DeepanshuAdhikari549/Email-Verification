<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Email Verification Module</title>

<style>

body{
  font-family:Arial;
  background:#081120;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:700px;
  background:#111c2f;
  padding:40px;
  border-radius:15px;
}

input{
  width:100%;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:20px;
  padding:15px 25px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:#091325;
  padding:20px;
  border-radius:10px;
  white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h1>Email Verification Module</h1>

<input
type="text"
id="email"
placeholder="Enter email">

<button onclick="verifyEmail()">

Verify Email

</button>

<div class="result" id="result">

Result appears here...

</div>

</div>

<script>

async function verifyEmail(){

  const email =
    document.getElementById('email').value;

  const resultBox =
    document.getElementById('result');

  resultBox.innerHTML = "Checking...";

  try{

    const response =
      await fetch(
      `/api/verify?email=${email}`
    );

    const data =
      await response.json();

    resultBox.innerHTML =
      JSON.stringify(data, null, 2);

  }catch(error){

    resultBox.innerHTML =
      error.message;

  }

}

</script>

</body>
</html>
