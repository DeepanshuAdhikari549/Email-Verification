<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Email Verification Module</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#081120;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:800px;
      background:#111c2f;
      border-radius:15px;
      padding:40px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:42px;
    }

    .subtitle{
      text-align:center;
      color:#aaa;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:10px;
      border:2px solid #3b82f6;
      background:#0b1425;
      color:white;
      font-size:18px;
      margin-bottom:20px;
    }

    button{
      padding:15px 25px;
      background:#3b82f6;
      border:none;
      color:white;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    .result{
      margin-top:25px;
      background:#091325;
      padding:20px;
      border-radius:10px;
      overflow:auto;
      white-space:pre-wrap;
      font-size:15px;
    }

    .api{
      margin-top:30px;
      color:#bbb;
    }

    .api code{
      color:#4ade80;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Email Verification Module</h1>

  <p class="subtitle">
    Syntax validation · DNS MX lookup · SMTP RCPT TO · Typo detection
  </p>

  <input
    type="text"
    id="email"
    placeholder="Enter email address"
  >

  <button onclick="verifyEmail()">
    Verify Email
  </button>

  <div class="result" id="result">

Result will appear here...

  </div>

  <div class="api">

    <p><code>GET /api/verify?email=test@gmail.com</code></p>

  </div>

</div>

<script>

async function verifyEmail(){

  const email =
    document.getElementById('email').value;

  const resultBox =
    document.getElementById('result');

  if(!email){

    resultBox.innerHTML =
      "Please enter an email address";

    return;
  }

  resultBox.innerHTML = "Checking email...";

  try{

    const response = await fetch(
      `/api/verify?email=${email}`
    );

    const data = await response.json();

    resultBox.innerHTML =
      JSON.stringify(data, null, 2);

  }catch(error){

    resultBox.innerHTML =
      "Error: " + error.message;

  }

}

</script>

</body>
</html>
